<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkBridge — ログイン</title>
  <script src="/static/login-i18n.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Tailwind CDN이 막혀도 레이아웃·hidden 이 동작하도록 (로그인 화면이 비어 보이는 현상 방지) */
    .hidden {
      display: none !important;
    }
    body,
    button,
    input,
    select {
      font-family: "Meiryo UI", "Meiryo", "MS PGothic", "Hiragino Kaku Gothic ProN", sans-serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(to bottom, #eef2ff, #f3f4f6);
      color: #111827;
    }
    .login-shell {
      max-width: 28rem;
      margin-left: auto;
      margin-right: auto;
      padding: 2.5rem 1rem;
    }
    /* 任意入力: ラベル・枠をやや弱く（未入力でもよいことが分かるように） */
    .field-optional label {
      color: #6b7280;
    }
    .field-optional input {
      background-color: #f9fafb;
      border-color: #e5e7eb;
      color: #4b5563;
    }
    .field-optional input::placeholder {
      color: #9ca3af;
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-indigo-50 to-gray-100 text-gray-900 antialiased">
  <noscript>
    <p style="padding: 1rem; text-align: center; background: #fef2f2; color: #991b1b">
      この画面を使うには JavaScript を有効にしてください。 / 이 화면을 쓰려면 브라우저에서 JavaScript를 켜 주세요.
    </p>
  </noscript>
  <div class="max-w-md mx-auto px-4 py-10 login-shell">
    <p class="text-center text-[11px] font-semibold uppercase tracking-wide text-indigo-600">WorkBridge</p>
    <h1 id="login-page-title" class="text-center text-xl font-bold text-gray-900 mt-1 mb-3">ログイン</h1>
    <p id="login-lang-caption" class="text-center text-[11px] text-gray-500 mb-1 font-medium"></p>
    <div id="login-lang-row" class="flex flex-wrap justify-center gap-2 mb-8" role="group" aria-label="Display language"></div>

    <div id="step-role" class="space-y-4">
      <p id="step-role-caption" class="text-sm text-gray-600 text-center">利用する画面を選んでください</p>
      <button type="button" id="pick-admin" class="w-full py-4 rounded-2xl bg-indigo-900 text-white font-semibold shadow-md hover:bg-indigo-800 transition"></button>
      <button type="button" id="pick-worker" class="w-full py-4 rounded-2xl bg-white border-2 border-indigo-200 text-indigo-950 font-semibold shadow-sm hover:bg-indigo-50 transition"></button>
      <button type="button" id="pick-super" class="w-full py-3 rounded-2xl bg-slate-800 text-white text-sm font-semibold shadow-sm hover:bg-slate-700 transition border border-slate-600"></button>
    </div>

    <div id="step-form" class="hidden space-y-4 mt-2">
      <button type="button" id="back-role" class="text-sm text-indigo-700 underline underline-offset-2"></button>
      <p id="form-title" class="text-sm font-semibold text-gray-800"></p>

      <div id="worker-mode-wrap" class="hidden space-y-1">
        <label for="worker-mode" id="worker-mode-section-label" class="block text-xs font-medium text-gray-600">入室のしかた</label>
        <select
          id="worker-mode"
          class="w-full rounded-xl border border-gray-300 px-3 py-3 text-base bg-white text-gray-900"
        >
          <option value="shared">共有パスワードで入る（スタッフIDなし）</option>
          <option value="staff">スタッフ個人アカウントで入る（スタッフID＋個人パスワード）</option>
        </select>
        <p id="worker-mode-help" class="text-[11px] text-gray-500 leading-relaxed"></p>
      </div>

      <div id="username-wrap">
        <label for="username" id="username-label" class="block text-xs font-medium text-gray-600">ログインID / ワークスペース</label>
        <input type="text" id="username" autocomplete="username" class="w-full rounded-xl border border-gray-300 px-3 py-3 text-base bg-white" placeholder="" />
      </div>

      <div id="worker-staff-wrap" class="hidden space-y-1">
        <label for="worker-account-login" id="worker-staff-id-label" class="block text-xs font-medium text-gray-600">スタッフID（管理者が登録したログインID）</label>
        <input
          type="text"
          id="worker-account-login"
          autocomplete="off"
          maxlength="100"
          class="w-full rounded-xl border border-gray-300 px-3 py-3 text-base bg-white"
          placeholder=""
        />
      </div>

      <div>
        <label for="password" id="password-label" class="block text-xs font-medium text-gray-600">パスワード</label>
        <input type="password" id="password" autocomplete="current-password" class="w-full rounded-xl border border-gray-300 px-3 py-3 text-base bg-white" placeholder="" />
        <p id="password-hint" class="text-[11px] text-gray-500 mt-1 min-h-[1.1rem]"></p>
      </div>

      <div id="worker-name-wrap" class="hidden field-optional space-y-1">
        <label for="user-label" id="worker-display-name-label" class="block text-xs">表示名（省略可）</label>
        <input type="text" id="user-label" maxlength="100" class="w-full rounded-xl border px-3 py-3 text-base" placeholder="例：山田" />
      </div>

      <p id="login-err" class="text-sm text-rose-600 hidden"></p>
      <button type="button" id="btn-login" class="w-full py-4 rounded-2xl bg-indigo-900 text-white font-semibold shadow-md hover:bg-indigo-800 transition">
        ログイン
      </button>
      <p id="form-footer-hint" class="text-[11px] text-gray-500 leading-relaxed"></p>
    </div>
  </div>

  <script>
    (function () {
      var LOGIN_FLAGS = { ja: "🇯🇵", en: "🇺🇸", ko: "🇰🇷", zh: "🇨🇳", vi: "🇻🇳", id: "🇮🇩" };
      var LOGIN_ORDER = ["ja", "en", "ko", "zh", "vi", "id"];
      var loginUiLocale = "ja";

      function loginT(key) {
        var packs = window.__WB_LOGIN_I18N__ || {};
        var p = packs[loginUiLocale] || packs.ja || {};
        var v = p[key];
        if (v !== undefined && v !== null) return v;
        var ja = packs.ja || {};
        return ja[key] !== undefined ? ja[key] : key;
      }

      try {
        var pref =
          localStorage.getItem("wb_login_ui_locale") || localStorage.getItem("workbridge_worker_locale") || "";
        if (pref && window.__WB_LOGIN_I18N__ && window.__WB_LOGIN_I18N__[pref]) loginUiLocale = pref;
      } catch (e0) {}

      var role = "";
      var params = new URLSearchParams(location.search);
      var preset = params.get("role");
      var stepRole = document.getElementById("step-role");
      var stepForm = document.getElementById("step-form");
      var usernameWrap = document.getElementById("username-wrap");
      var backRole = document.getElementById("back-role");
      var formTitle = document.getElementById("form-title");
      var username = document.getElementById("username");
      var usernameLabel = document.getElementById("username-label");
      var password = document.getElementById("password");
      var passwordLabel = document.getElementById("password-label");
      var passwordHint = document.getElementById("password-hint");
      var userLabel = document.getElementById("user-label");
      var workerNameWrap = document.getElementById("worker-name-wrap");
      var workerModeWrap = document.getElementById("worker-mode-wrap");
      var workerMode = document.getElementById("worker-mode");
      var workerModeSectionLabel = document.getElementById("worker-mode-section-label");
      var workerModeHelp = document.getElementById("worker-mode-help");
      var workerStaffWrap = document.getElementById("worker-staff-wrap");
      var workerStaffIdLabel = document.getElementById("worker-staff-id-label");
      var workerDisplayNameLabel = document.getElementById("worker-display-name-label");
      var workerAccountLogin = document.getElementById("worker-account-login");
      var formFooterHint = document.getElementById("form-footer-hint");
      var btnLogin = document.getElementById("btn-login");
      var loginErr = document.getElementById("login-err");
      var loginLangRow = document.getElementById("login-lang-row");
      var loginLangCaption = document.getElementById("login-lang-caption");

      function persistLoginUiLocale() {
        try {
          localStorage.setItem("wb_login_ui_locale", loginUiLocale);
        } catch (e1) {}
      }

      function syncLoginLangButtons() {
        if (!loginLangRow) return;
        loginLangRow.querySelectorAll("[data-login-locale]").forEach(function (btn) {
          var loc = btn.getAttribute("data-login-locale");
          var on = loc === loginUiLocale;
          btn.className = on
            ? "flex flex-col items-center gap-0.5 rounded-xl px-2.5 py-2 bg-indigo-100 ring-2 ring-indigo-400 shadow-sm min-w-[3.25rem]"
            : "flex flex-col items-center gap-0.5 rounded-xl px-2.5 py-2 border border-gray-200 bg-white hover:bg-gray-50 min-w-[3.25rem]";
          btn.setAttribute("aria-pressed", on ? "true" : "false");
        });
      }

      function applyLoginLocale() {
        try {
          document.documentElement.lang =
            loginUiLocale === "zh" ? "zh-Hans" : loginUiLocale === "ja" ? "ja" : loginUiLocale;
        } catch (elang) {}
        document.title = "WorkBridge — " + loginT("login_title");
        var pt = document.getElementById("login-page-title");
        if (pt) pt.textContent = loginT("login_title");
        if (loginLangCaption) loginLangCaption.textContent = loginT("login_lang_hint");
        var cap = document.getElementById("step-role-caption");
        if (cap) cap.textContent = loginT("step_pick");
        var pa = document.getElementById("pick-admin");
        var pw = document.getElementById("pick-worker");
        var ps = document.getElementById("pick-super");
        if (pa) pa.textContent = loginT("pick_admin");
        if (pw) pw.textContent = loginT("pick_worker");
        if (ps) ps.textContent = loginT("pick_super");
        if (backRole) backRole.textContent = loginT("back");
        if (workerModeSectionLabel) workerModeSectionLabel.textContent = loginT("worker_entry_mode");
        var wm = workerMode;
        if (wm) {
          var prev = wm.value || "shared";
          wm.innerHTML =
            '<option value="shared">' +
            loginT("mode_shared") +
            "</option>" +
            '<option value="staff">' +
            loginT("mode_staff") +
            "</option>";
          wm.value = prev === "staff" ? "staff" : "shared";
        }
        if (passwordLabel) passwordLabel.textContent = loginT("password_label");
        if (workerStaffIdLabel) workerStaffIdLabel.textContent = loginT("staff_id_label");
        if (workerDisplayNameLabel) workerDisplayNameLabel.textContent = loginT("display_name_label");
        if (userLabel) userLabel.setAttribute("placeholder", loginT("display_name_ph"));
        syncWorkerModeUi();
        syncLoginLangButtons();
        if (role === "admin") {
          if (formTitle) formTitle.textContent = loginT("form_admin");
          if (usernameLabel) usernameLabel.textContent = loginT("username_admin");
          if (username) username.setAttribute("placeholder", loginT("username_admin_ph"));
          if (formFooterHint) formFooterHint.textContent = loginT("footer_admin");
        } else if (role === "super_admin") {
          if (formTitle) formTitle.textContent = loginT("form_super");
          if (formFooterHint) formFooterHint.textContent = loginT("footer_super");
        } else if (role === "worker") {
          if (formTitle) formTitle.textContent = loginT("form_worker");
          if (usernameLabel) usernameLabel.textContent = loginT("username_ws");
          if (username) username.setAttribute("placeholder", loginT("username_ws_ph"));
          if (formFooterHint) formFooterHint.textContent = loginT("footer_worker");
        }
        if (btnLogin && !btnLogin.disabled) btnLogin.textContent = loginT("btn_login");
      }

      function syncWorkerModeUi() {
        if (role !== "worker") return;
        var mode = workerMode.value || "shared";
        if (mode === "staff") {
          workerStaffWrap.classList.remove("hidden");
          workerNameWrap.classList.add("hidden");
          workerModeHelp.textContent = loginT("worker_mode_help_staff");
          passwordHint.textContent = loginT("password_hint_staff");
        } else {
          workerStaffWrap.classList.add("hidden");
          workerNameWrap.classList.remove("hidden");
          workerModeHelp.textContent = loginT("worker_mode_help_shared");
          passwordHint.textContent = loginT("password_hint_shared");
        }
      }

      function showForm(r) {
        role = r;
        stepRole.classList.add("hidden");
        stepForm.classList.remove("hidden");
        loginErr.classList.add("hidden");
        if (r === "admin") {
          if (formTitle) formTitle.textContent = loginT("form_admin");
          if (usernameLabel) usernameLabel.textContent = loginT("username_admin");
          username.placeholder = loginT("username_admin_ph");
          passwordHint.textContent = "";
          if (formFooterHint) formFooterHint.textContent = loginT("footer_admin");
          workerModeWrap.classList.add("hidden");
          workerStaffWrap.classList.add("hidden");
          workerNameWrap.classList.add("hidden");
          usernameWrap.classList.remove("hidden");
          usernameLabel.className = "block text-xs font-medium text-gray-600";
        } else if (r === "super_admin") {
          if (formTitle) formTitle.textContent = loginT("form_super");
          passwordHint.textContent = "";
          if (formFooterHint) formFooterHint.textContent = loginT("footer_super");
          workerModeWrap.classList.add("hidden");
          workerStaffWrap.classList.add("hidden");
          workerNameWrap.classList.add("hidden");
          usernameWrap.classList.add("hidden");
        } else {
          if (formTitle) formTitle.textContent = loginT("form_worker");
          workerMode.value = "shared";
          if (usernameLabel) usernameLabel.textContent = loginT("username_ws");
          username.placeholder = loginT("username_ws_ph");
          if (formFooterHint) formFooterHint.textContent = loginT("footer_worker");
          workerModeWrap.classList.remove("hidden");
          usernameWrap.classList.remove("hidden");
          workerAccountLogin.value = "";
          syncWorkerModeUi();
        }
        applyLoginLocale();
      }

      if (loginLangRow) {
        LOGIN_ORDER.forEach(function (loc) {
          var btn = document.createElement("button");
          btn.type = "button";
          btn.setAttribute("data-login-locale", loc);
          btn.setAttribute("aria-label", loc);
          btn.className = "flex flex-col items-center gap-0.5 rounded-xl px-2.5 py-2 border border-gray-200 bg-white hover:bg-gray-50 min-w-[3.25rem]";
          btn.innerHTML =
            '<span class="text-2xl leading-none select-none" aria-hidden="true">' +
            (LOGIN_FLAGS[loc] || "🌐") +
            '</span><span class="text-[10px] font-semibold text-gray-700 uppercase">' +
            loc +
            "</span>";
          btn.addEventListener("click", function () {
            loginUiLocale = loc;
            persistLoginUiLocale();
            applyLoginLocale();
          });
          loginLangRow.appendChild(btn);
        });
      }

      workerMode.addEventListener("change", syncWorkerModeUi);

      var pickAdmin = document.getElementById("pick-admin");
      var pickWorker = document.getElementById("pick-worker");
      var pickSuper = document.getElementById("pick-super");
      pickAdmin.addEventListener("click", function () {
        showForm("admin");
      });
      pickWorker.addEventListener("click", function () {
        showForm("worker");
      });
      pickSuper.addEventListener("click", function () {
        showForm("super_admin");
      });
      backRole.addEventListener("click", function () {
        stepForm.classList.add("hidden");
        stepRole.classList.remove("hidden");
        role = "";
        applyLoginLocale();
      });

      applyLoginLocale();

      if (preset === "admin") showForm("admin");
      else if (preset === "worker") showForm("worker");
      else if (preset === "super_admin") showForm("super_admin");

      btnLogin.addEventListener("click", function () {
        loginErr.classList.add("hidden");
        var u = (username.value || "").trim();
        var p = password.value || "";
        if (role === "super_admin") {
          if (!p) {
            loginErr.textContent = loginT("err_pw_only");
            loginErr.classList.remove("hidden");
            return;
          }
        } else if (role === "worker") {
          var mode = workerMode.value || "shared";
          var wal = (workerAccountLogin.value || "").trim();
          if (!u || !p) {
            loginErr.textContent = loginT("err_ws_pw");
            loginErr.classList.remove("hidden");
            return;
          }
          if (mode === "staff" && !wal) {
            loginErr.textContent = loginT("err_staff_id");
            loginErr.classList.remove("hidden");
            return;
          }
        } else if (!u || !p) {
          loginErr.textContent = loginT("err_id_pw");
          loginErr.classList.remove("hidden");
          return;
        }
        var body = {
          role: role,
          username: role === "super_admin" ? "" : u,
          password: p,
        };
        if (role === "worker") {
          var modeW = workerMode.value || "shared";
          if (modeW === "staff") {
            var wid = (workerAccountLogin.value || "").trim();
            if (wid) body.worker_account_login = wid;
          }
          var ul = (userLabel.value || "").trim();
          if (modeW === "shared" && ul) body.user_label = ul;
        }
        btnLogin.disabled = true;
        btnLogin.textContent = loginT("btn_logging_in");
        fetch("/api/v1/auth/portal-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        })
          .then(function (r) {
            if (!r.ok) {
              return r.json().then(function (j) {
                var d = j.detail;
                if (Array.isArray(d)) d = d.map(function (x) { return x.msg || JSON.stringify(x); }).join(" ");
                throw new Error(typeof d === "string" ? d : String(r.status));
              });
            }
            return r.json();
          })
          .then(function (data) {
            if (role === "super_admin") {
              sessionStorage.setItem("wb_super_token", data.access_token);
              location.href = "/super";
            } else if (role === "admin") {
              sessionStorage.setItem("wb_admin_token", data.access_token);
              sessionStorage.setItem("wb_workspace_id", data.workspace_id);
              if (data.workspace_name) sessionStorage.setItem("wb_workspace_name", data.workspace_name);
              sessionStorage.removeItem("wb_super_assumed");
              location.href = "/admin";
            } else {
              try {
                localStorage.setItem("workbridge_worker_locale", loginUiLocale);
                localStorage.setItem("wb_login_ui_locale", loginUiLocale);
              } catch (e2) {}
              sessionStorage.setItem("wb_worker_token", data.access_token);
              sessionStorage.setItem("wb_worker_label", data.worker_display_label || "");
              sessionStorage.setItem("wb_workspace_id", data.workspace_id || "");
              location.href = "/worker";
            }
          })
          .catch(function (e) {
            loginErr.textContent = loginT("err_login_failed") + (e.message || e);
            loginErr.classList.remove("hidden");
            btnLogin.disabled = false;
            btnLogin.textContent = loginT("btn_login");
          });
      });
    })();
  </script>
</body>
</html>
