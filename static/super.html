<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkBridge — 総運営 · 顧客ワークスペース</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, button { font-family: "Meiryo UI", "Meiryo", sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <p class="text-[11px] font-semibold text-indigo-600">WorkBridge 総運営</p>
    <h1 class="text-xl font-bold mt-1 mb-2">顧客ワークスペースを選択</h1>
    <p class="text-sm text-gray-600 mb-6">選択すると、その現場の管理者画面と同じ権限で開きます。</p>
    <p id="err" class="text-sm text-rose-600 hidden mb-4"></p>
    <ul id="list" class="space-y-2"></ul>
    <p id="empty" class="text-sm text-gray-500 hidden">ワークスペースがありません。顧客の管理者が一度ログインすると作成されます。</p>
    <p class="mt-8 text-center">
      <a href="/login" class="text-sm text-indigo-700 underline">ログインに戻る</a>
    </p>
  </div>
  <script>
    (function () {
      var tok = sessionStorage.getItem("wb_super_token");
      if (!tok) {
        location.href = "/login?role=super_admin";
        return;
      }
      var err = document.getElementById("err");
      var list = document.getElementById("list");
      var empty = document.getElementById("empty");
      fetch("/api/v1/workspaces?super_token=" + encodeURIComponent(tok))
        .then(function (r) {
          if (r.status === 401 || r.status === 403) {
            sessionStorage.removeItem("wb_super_token");
            location.href = "/login?role=super_admin";
            return Promise.reject();
          }
          if (!r.ok) throw new Error(String(r.status));
          return r.json();
        })
        .then(function (rows) {
          if (!rows || !rows.length) {
            empty.classList.remove("hidden");
            return;
          }
          rows.forEach(function (w) {
            var li = document.createElement("li");
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className =
              "w-full text-left px-4 py-3 rounded-xl bg-white border border-gray-200 shadow-sm hover:bg-indigo-50 hover:border-indigo-200 transition";
            var metaParts = [];
            if (w.company_name) metaParts.push("会社: " + w.company_name);
            if (w.branch_name) metaParts.push("店舗: " + w.branch_name);
            if (w.department_name) metaParts.push("部署: " + w.department_name);
            var metaHtml =
              metaParts.length > 0
                ? "<span class=\"block text-[11px] text-gray-600 mt-1 leading-snug\">" +
                  escapeHtml(metaParts.join(" · ")) +
                  "</span>"
                : "";
            btn.innerHTML =
              "<span class=\"font-semibold text-gray-900\">" +
              escapeHtml(w.name) +
              "</span><span class=\"block text-[11px] text-gray-500 font-mono mt-1\">" +
              escapeHtml(w.id) +
              "</span>" +
              metaHtml;
            btn.addEventListener("click", function () {
              btn.disabled = true;
              fetch("/api/v1/auth/super-assume", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ super_token: tok, workspace_id: w.id }),
              })
                .then(function (r) {
                  if (!r.ok) return r.json().then(function (j) { throw new Error(j.detail || r.status); });
                  return r.json();
                })
                .then(function (data) {
                  sessionStorage.setItem("wb_admin_token", data.admin_token);
                  sessionStorage.setItem("wb_workspace_id", data.workspace_id);
                  sessionStorage.setItem("wb_workspace_name", data.workspace_name);
                  sessionStorage.setItem("wb_super_assumed", "1");
                  location.href = "/admin";
                })
                .catch(function (e) {
                  err.textContent = String(e.message || e);
                  err.classList.remove("hidden");
                  btn.disabled = false;
                });
            });
            li.appendChild(btn);
            list.appendChild(li);
          });
        })
        .catch(function (e) {
          if (!e) return;
          err.textContent = "一覧を取得できませんでした。";
          err.classList.remove("hidden");
        });
      function escapeHtml(s) {
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }
    })();
  </script>
</body>
</html>
