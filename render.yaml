services:
  - type: web
    name: workbridge
    runtime: docker
    region: singapore
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    disk:
      name: workbridge-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      # ⚠ Native Python BuildPack 으로 빠질 경우의 안전망. Docker 모드면 무시됨.
      # psycopg + Python 3.14 의 finalization 호환성 문제로 부팅 실패하므로 3.12 강제.
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        value: sqlite:////app/data/workbridge.db
      - key: PORTAL_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: GOOGLE_CREDENTIALS_PATH
        value: /etc/secrets/google_key.json
